name: CI # Название рабочего процесса

on:
  push: # Запускается при пуше
    branches: [ "main" ] # ... в ветку main
  pull_request: # И при создании pull request'а
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Переменные для БД в CI
  DATABASE_URL: postgres://postgres:password@localhost:5432/financial_monitor
  SKIP_DOCKER: true

jobs:
  # ---------- ЗАДАЧА 1: Форматирование ----------
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  # ---------- ЗАДАЧА 2: Линтинг ----------
  lint:
    name: Linting
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run linter
        run: cargo clippy -- -A unused-imports

  # ---------- ЗАДАЧА 3: Тесты ----------
  test:
    name: Tests
    runs-on: ubuntu-latest

    # База данных как сервис
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      # Устанавливаем sqlx-cli и выполняем миграции
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --features postgres --no-default-features --locked

      - name: Run migrations
        run: |
          chmod +x scripts/init_db.sh
          SKIP_DOCKER=true ./scripts/init_db.sh

      # Готовим кеш запросов sqlx для автономного режима
      - name: Prepare sqlx cache
        run: cargo sqlx prepare --workspace --check

      - name: Run tests
        run: cargo test --workspace